# Agent Orchestrator Configuration
# Each capability maps to an agent: claude | codex | gemini

agents:
  plan:
    provider: claude
    description: "Planning & architecture design"
  code:
    provider: codex
    description: "Code generation & implementation"
    mcp_tool: mcp__codex-cli-mcp__ask-codex
    options:
      model: gpt-5
      sandbox: workspace-write
  review:
    provider: gemini
    description: "Code review & quality analysis"
    mcp_tool: mcp__gemini-cli-mcp__ask-gemini
  design:
    provider: gemini
    description: "UI/UX and icon design"
    mcp_tool: mcp__gemini-cli-mcp__ask-gemini
  test:
    provider: codex
    description: "Test writing & execution"
    mcp_tool: mcp__codex-cli-mcp__ask-codex
    options:
      model: gpt-5
      sandbox: workspace-write
  refactor:
    provider: codex
    description: "Code refactoring & optimization"
    mcp_tool: mcp__codex-cli-mcp__ask-codex
    options:
      model: gpt-5
      sandbox: workspace-write

# Override defaults per project by copying this file
# Runtime override: use --agent flag (e.g., /orchestrate code --agent=gemini)
